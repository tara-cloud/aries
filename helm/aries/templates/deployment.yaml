---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aries-postgres
  namespace: aries
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aries-postgres
  template:
    metadata:
      labels:
        app: aries-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aries-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pgdata
          hostPath:
            path: {{ .Values.postgres.dataPath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: aries-postgres
  namespace: aries
spec:
  selector:
    app: aries-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Aries App ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aries
  namespace: aries
  labels:
    app: aries
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aries
  template:
    metadata:
      labels:
        app: aries
        version: {{ .Values.image.tag | quote }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc aries-postgres 5432 -w 1 </dev/null; do echo waiting; sleep 3; done']
      containers:
        - name: aries
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              hostPort: {{ .Values.service.nodePort }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: AUTH_TRUST_HOST
              value: {{ .Values.auth.trustHost | quote }}
            - name: HOME_NAME
              value: {{ .Values.auth.homeName | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.auth.adminEmail | quote }}
            - name: DATA_MOUNT_PATH
              value: /data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aries-secrets
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: aries-secrets
                  key: AUTH_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aries-secrets
                  key: ADMIN_PASSWORD
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: 10
          volumeMounts:
            - name: appdata
              mountPath: /data
      volumes:
        - name: appdata
          hostPath:
            path: {{ .Values.app.dataPath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: aries
  namespace: aries
  labels:
    app: aries
spec:
  selector:
    app: aries
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
